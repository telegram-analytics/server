name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type-check with mypy
        run: mypy app

      - name: Check OpenAPI spec is up to date
        run: python scripts/export_openapi.py --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tganalytics_test
          POSTGRES_USER: tga
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tga -d tganalytics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://tga:testpassword@localhost/tganalytics_test"
        run: alembic upgrade head

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "1234567890:test-token-for-testing-only"
          ADMIN_CHAT_ID: "123456789"
          DATABASE_URL: "postgresql+asyncpg://tga:testpassword@localhost/tganalytics_test"
          SECRET_KEY: "ci-secret-key-not-for-production"
          WEBHOOK_BASE_URL: "https://example.com"
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true
